<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sean Ki</title>

<style>
/* 기본 */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 상단 바 */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 30px;
  border-bottom: 1px solid #ddd;
}

/* 이름 */
.logo {
  font-size: 20px;
  font-weight: bold;
}

/* 메뉴 */
.menu {
  display: flex;
  gap: 15px;
}

.menu a {
  text-decoration: none;
  color: black;
  font-weight: 500;
  cursor: pointer;
}

.menu a:hover {
  color: #007bff;
}

/* 프로필 사진 */
.profile-img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
}

/* 본문 */
.content {
  text-align: center;
  margin-top: 80px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- 상단 -->
<header class="topbar">
  <div class="logo">Sean Ki</div>

  <nav class="menu">
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('contact')">Contact</a>
  </nav>

  <img src="20260616_193504.jpg" class="profile-img" alt="profile">
</header>

<!-- 내용 -->
<div class="content" id="content">
  👋 Home it is
</div>

<script>
function showPage(page) {
  const content = document.getElementById("content");

  if (page === "home") {
    content.innerHTML = "👋 Home it is";
  }

  if (page === "about") {
    content.innerHTML = `
      <h2>About Me</h2>
      <p>Im trying to search myself</p>
    `;
  }

  if (page === "contact") {
    content.innerHTML = `
      <h2>Contact</h2>
      <p>Email: example@email.com</p>
    `;
  }
}
</script>

</body>
</html>
