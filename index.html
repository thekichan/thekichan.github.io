<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sean Ki</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== 상단 바 (이름 + 메뉴만) ===== */
.topbar {
  display: flex;
  align-items: center;

  justify-content: space-between;

  padding: 15px 40px;
  border-bottom: 1px solid #ddd;

  max-width: 1000px;
  margin: 0 auto;
}

/* 왼쪽 이름 */
.logo {
  font-size: 30px;
  font-weight: bold;
  margin-left: 10px;
}

/* 메뉴 (중앙 정렬 문제 해결) */
.menu {
  display: flex;
  gap: 30px;

  /* 👉 중앙으로 가지 않게 강제 */
  margin-left: auto;
  margin-right: 20px;
}

.menu a {
  text-decoration: none;
  color: black;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.menu a:hover {
  color: #007bff;
  transform: scale(1.1);
}

/* ===== 사진은 header 밖 (완전 분리) ===== */
.profile-box {
  max-width: 1000px;
  margin: 20px auto 0 auto;

  display: flex;
  justify-content: flex-end;

  padding-right: 40px;
}

.profile-img {
  width: 300px;
  height: 300px;
  border-radius: 0%;
  object-fit: cover;
}

/* ===== 본문 ===== */
.content {
  text-align: center;
  margin-top: 80px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- 상단 -->
<header class="topbar">
  <div class="logo">Sean Ki</div>

  <nav class="menu">
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('contact')">Contact</a>
  </nav>
</header>

<!-- 사진 (헤더 밖이라 무조건 아래로 내려감) -->
<div class="profile-box">
  <img src="20260616_193504.jpg" class="profile-img" alt="profile">
</div>

<!-- 내용 -->
<div class="content" id="content">
  👋 Home it is
</div>

<script>
function showPage(page) {
  const content = document.getElementById("content");

  if (page === "home") {
    content.innerHTML = "👋 Home it is";
  }

  if (page === "about") {
    content.innerHTML = `
      <h2>About Me</h2>
      <p>Im trying to search myself</p>
    `;
  }

  if (page === "contact") {
    content.innerHTML = `
      <h2>Contact</h2>
      <p>Email: example@email.com</p>
    `;
  }
}
</script>

</body>
</html>
