<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sean Ki</title>

<style>
/* 기본 */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 상단 바 */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 15px 30px;
  border-bottom: 1px solid #ddd;

  max-width: 1000px;
  margin: 0 auto;
}

/* 왼쪽 이름 */
.logo {
  font-size: 30px;
  font-weight: bold;
  margin-left: 20px; /* 👈 왼쪽에서 떨어지게 */
}

/* 메뉴 */
.menu {
  display: flex;
  gap: 30px;
  margin-right: 40px; /* 👈 오른쪽으로 살짝 이동 */
}

.menu a {
  text-decoration: none;
  color: black;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.menu a:hover {
  color: #007bff;
  transform: scale(1.1);
}

/* 사진 영역 (메뉴바 아래) */
.profile-box {
  display: flex;
  justify-content: flex-end;

  max-width: 1000px;
  margin: 10px auto 0 auto;
  padding-right: 40px;
}

/* 사진 */
.profile-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
}

/* 본문 */
.content {
  text-align: center;
  margin-top: 80px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- 상단 -->
<header class="topbar">
  <div class="logo">Sean Ki</div>

  <nav class="menu">
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('contact')">Contact</a>
  </nav>
</header>

<!-- 사진 (메뉴 아래로 분리) -->
<div class="profile-box">
  <img src="20260616_193504.jpg" class="profile-img" alt="profile">
</div>

<!-- 내용 -->
<div class="content" id="content">
  👋 Home it is
</div>

<script>
function showPage(page) {
  const content = document.getElementById("content");

  if (page === "home") {
    content.innerHTML = "👋 Home it is";
  }

  if (page === "about") {
    content.innerHTML = `
      <h2>About Me</h2>
      <p>Im trying to search myself</p>
    `;
  }

  if (page === "contact") {
    content.innerHTML = `
      <h2>Contact</h2>
      <p>Email: example@email.com</p>
    `;
  }
}
</script>

</body>
</html>
